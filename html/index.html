<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ping Pong</title>
<style>
  body { text-align: center; background: #222; color: #fff; font-family: sans-serif; }
  canvas { background: #000; display: block; margin: 0 auto; }
</style>
</head>
<body>
<h1>Ping Pong</h1>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const paddleWidth = 10, paddleHeight = 100, ballSize = 10;
const left = { x: 10, y: canvas.height/2 - paddleHeight/2, speed: 5 };
const right = { x: canvas.width - paddleWidth - 10, y: canvas.height/2 - paddleHeight/2, speed: 5 };
const ball = { x: 0, y: 0, vx: 4, vy: 4 };
let leftScore = 0, rightScore = 0;
const keys = {};
document.addEventListener('keydown', e => keys[e.key] = true);
document.addEventListener('keyup', e => keys[e.key] = false);
function resetBall(dir) {
  ball.x = canvas.width/2 - ballSize/2;
  ball.y = canvas.height/2 - ballSize/2;
  ball.vx = (dir || (Math.random()<0.5?-1:1)) * 4;
  ball.vy = (Math.random()*2-1) * 4;
}
function update() {
  if(keys['w'] && left.y>0) left.y -= left.speed;
  if(keys['s'] && left.y<canvas.height-paddleHeight) left.y += left.speed;
  if(keys['ArrowUp'] && right.y>0) right.y -= right.speed;
  if(keys['ArrowDown'] && right.y<canvas.height-paddleHeight) right.y += right.speed;
  ball.x += ball.vx; ball.y += ball.vy;
  if(ball.y<0 || ball.y>canvas.height-ballSize) ball.vy *= -1;
  if(ball.x<=left.x+paddleWidth && ball.y+ballSize>=left.y && ball.y<=left.y+paddleHeight) ball.vx = Math.abs(ball.vx);
  if(ball.x+ballSize>=right.x && ball.y+ballSize>=right.y && ball.y<=right.y+paddleHeight) ball.vx = -Math.abs(ball.vx);
  if(ball.x<0){ rightScore++; resetBall(1); }
  else if(ball.x>canvas.width-ballSize){ leftScore++; resetBall(-1); }
}
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle='white';
  ctx.fillRect(left.x,left.y,paddleWidth,paddleHeight);
  ctx.fillRect(right.x,right.y,paddleWidth,paddleHeight);
  ctx.fillRect(ball.x,ball.y,ballSize,ballSize);
  ctx.font='24px sans-serif';
  ctx.fillText(leftScore, canvas.width/4, 30);
  ctx.fillText(rightScore, canvas.width*3/4, 30);
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
resetBall();
loop();
</script>
</body>
</html>
