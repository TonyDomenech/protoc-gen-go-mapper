# Response field patterns (configurable)
response_patterns:
  data_field: "data"
  total_field: "total"
  page_field: "page"
  limit_field: "limit"
  response_suffix: "Response"
  skip_fields: ["DeletedAt", "DeletedBy"]
# Pointer handling strategies (optional)
pointer_settings:
  default_strategy: "strict"
  field_strategies:
    CreatedAt: "lenient"
    UpdatedAt: "lenient"
    DeletedAt: "omit"
messages:
  - User
field_handlers:
  # Add custom field handlers here if needed
