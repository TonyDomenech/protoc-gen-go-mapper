# Mapper configuration for protoc-gen-go-mapper
version: v1
database: sqlc
db_package: github.com/jwart212/protoc-gen-go-mapper/examples/simple/db
package:
  proto: github.com/jwart212/protoc-gen-go-mapper/examples/simple/gen
  db: github.com/jwart212/protoc-gen-go-mapper/examples/simple/db
type_mappings:
  User: User
# Response type mappings for list responses (proto message -> SQLC Row type)
response_type_mappings:
  SupplierResponse: SupplierResponse
# Type aliases for reuse (optional, for custom conversions)
type_aliases:
  UUIDField:
    proto_type: string
    db_type: pgtype.UUID
    is_optional: false
    to_proto_expr: "ConvertUUID[string]({variable}.{dbField})"
    to_db_expr: "ConvertUUIDToDB({protoField})"

  OptionalUUID:
    proto_type: string
    db_type: pgtype.UUID
    is_optional: true
    to_proto_expr: "ConvertUUID[*string]({variable}.{dbField})"
    to_db_expr: "ConvertUUIDPtrToDB({protoField})"

  OptionalText:
    proto_type: string
    db_type: pgtype.Text
    is_optional: true
    to_proto_expr: "ConvertText[*string]({variable}.{dbField})"
    to_db_expr: "ConvertTextToDB({protoField})"
